  <script>
    var stationWs = null;
    var pendingMacUpdate = null;

    function ensureStationWs() {
      if (stationWs && stationWs.readyState === 1) return; // OPEN
      if (stationWs && (stationWs.readyState === 0 || stationWs.readyState === 2)) return; // CONNECTING / CLOSING

      var wsUrl = "ws://" + window.location.hostname + ":81/";
      stationWs = new WebSocket(wsUrl);

      stationWs.onopen = function () {
        if (pendingMacUpdate) {
          stationWs.send(pendingMacUpdate);
          pendingMacUpdate = null;
        }
      };

      stationWs.onmessage = function (evt) {
        try {
          if (typeof evt.data === "string") {
            var obj = JSON.parse(evt.data);
            if (obj && obj.alert) {
              alert(obj.msg || obj.alert);
            }
          }
        } catch (e) {
          // ignore non-json
        }
      };
    }

    function sendStationMacs() {
      var cabin = document.getElementById("cabin_mac_id")?.value?.trim() || "";
      var vsg = document.getElementById("vsg_mac_id")?.value?.trim() || "";
      var vtg = document.getElementById("vtg_mac_id")?.value?.trim() || "";

      if (!cabin || !vsg || !vtg) {
        alert("Please fill cabin_mac, vsg_mac, and vtg_mac before updating.");
        return;
      }

      pendingMacUpdate = JSON.stringify({
        cabin_mac: cabin,
        vsg_mac: vsg,
        vtg_mac: vtg
      });
      ensureStationWs();
      alert("Sending MAC update over websocket...");
    }

    function sendWifiChannel() {
      var ch = document.getElementById("wifi_channel_id")?.value?.trim() || "";
      var chan = parseInt(ch, 10);
      if (!chan || chan < 1 || chan > 13) {
        alert("Please enter WiFi channel 1..13.");
        return;
      }

      pendingMacUpdate = JSON.stringify({
        wifi_channel: chan
      });
      ensureStationWs();
      alert("Sending WiFi channel update over websocket...");
    }
  </script>
