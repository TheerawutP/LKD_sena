  <link rel="stylesheet" href="nanostatstyle.css">

  <meta name="theme-color" content="#2C73B5">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LuckD">

  <meta name="apple-mobile-web-app-title" content="LuckD">
  <link rel="apple-touch-icon" href="app-icon.png">

<body>
  <div class="main-container">
    <nav class="navbar navbar-dark bg-transparent w-100 d-flex justify-content-center pt-2">
      <a href="#" class="navbar-brand m-0 text-center">

        <div class="logo-container">
          <img src="ximplex_by_flinkone.png" alt="XIMPLEX Logo" class="main-logo">
        </div>

        <div class="brand-subname">LuckD</div>
      </a>
    </nav>




    <div class="screen-top">
      <div class="control-panel-vertical">


        <div class="status-row">

          <div class="status-row">
            <div class="seven-seg" id="FloorValue" style="font-family:'Digital-7 Mono', monospace;">
              <span class="floor-num">1</span>

              <span class="floor-msg">BETWEEN FLOORS</span>
            </div>
          </div>

        </div>

        <script src="https://unpkg.com/lucide@latest"></script>


        <button class="lift-btn" id="btnUp" onclick="on_Button_UP_pressed()">
          <i data-lucide="arrow-up"></i>
        </button>


        <button class="lift-btn" id="btnDown" onclick="on_Button_DOWN_pressed()">
          <i data-lucide="arrow-down"></i>
        </button>

        <button class="lift-btn stop-style" id="btnStop" onclick="on_Button_STOP_pressed()">
          <i id="stopIcon" data-lucide="pause"></i>
        </button>

        <button class="lift-btn bell-style" id="btnEmg" onclick="on_Button_EMERGENCY_pressed()">
          <i id="bellIcon" data-lucide="triangle-alert"></i>
        </button>

        <div class="emg-msg-container">
          <div class="emg-text" id="emgText">
            EMERGENCY!
            <div class="emg-sub">Press STOP button to clear</div>
          </div>
        </div>


        <script>lucide.createIcons();</script>

      </div>

    </div>
  </div>

    crossorigin="anonymous"></script>
    

    <div id="toast-container"></div>
</body>
