<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inverter Raw Data</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #2C73B5; color: #fff; font-family: 'Inter', sans-serif; }
    .data-card { 
      background: rgba(255, 255, 255, 0.1); 
      backdrop-filter: blur(10px);
      border-radius: 10px; 
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 20px; 
      margin-top: 20px;
    }
    .reg-row { 
      display: flex; justify-content: space-between; 
      border-bottom: 1px solid rgba(255, 255, 255, 0.2); 
      padding: 12px 0; 
      font-size: 1.1rem;
    }
    .reg-row:last-child { border-bottom: none; }
    .reg-addr { font-weight: bold; color: #FFBF00; }
    .reg-val { 
      font-family: monospace; font-size: 1.2rem; 
      background: rgba(0,0,0,0.3); padding: 4px 12px; border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="container" style="max-width: 500px;">
    <h3 class="text-center mt-4">Inverter Data Monitor</h3>
    <p class="text-center mb-2" style="font-size: 0.9rem; color: #ccc;">Starting Address: 28672 (0x7000)</p>
    
    <div class="data-card">
      <div id="registers-container">
        </div>
    </div>
    
    <div class="text-center mt-4">
      <a href="index.html" class="btn btn-outline-light">กลับไปหน้าหลัก</a>
    </div>
  </div>

  <script>
    const wsUrl = "ws://" + window.location.hostname + ":81/";
    let ws;

    function init() {
      // สร้างแถวรอไว้ 10 แถว
      const container = document.getElementById("registers-container");
      let html = "";
      for(let i = 0; i < 10; i++) {
        html += `<div class="reg-row">
                   <span class="reg-addr">Reg ${28672 + i}</span>
                   <span class="reg-val" id="reg-${i}">-</span>
                 </div>`;
      }
      container.innerHTML = html;
      connectWS();
    }

    function connectWS() {
      ws = new WebSocket(wsUrl);
      ws.onmessage = function(event) {
        try {
          const obj = JSON.parse(event.data);
          // ถ้ามี Array inv_raw ส่งมา ให้เอาไปอัปเดตบนหน้าจอ
          if (obj.inv_raw && obj.inv_raw.length === 10) {
            for(let i = 0; i < 10; i++) {
              document.getElementById(`reg-${i}`).innerText = obj.inv_raw[i];
            }
          }
        } catch (e) {
          console.error("JSON Error: ", e);
        }
      };
      
      ws.onclose = function() {
        setTimeout(connectWS, 2000); // ถ้าหลุดให้พยายามต่อใหม่ทุก 2 วิ
      };
    }

    window.addEventListener("load", init);
  </script>
</body>
</html>
